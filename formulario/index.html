<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domótica en el Hogar</title>
	<link rel="shortcut icon" href="/img/sionlogo azul.png">
	<link rel="stylesheet" href="/sion.css">
</head>
<body>
	<section class="cabecera-container">
		<header class = "header">
			<a href="/" class="logo"> 
				<img class="logo" src="/img/sionlogo.png" alt="logo de la pagina" id="logo" >
			</a>
			<div class="menu" id="menu">
			<div class="menuicon" onclick="toggleMenu()">
				<div></div>
				<div></div>
				<div></div>
			</div>
			<div class="close-icon" onclick="toggleMenu()"></div>
				<div class="nav-links" id="nav-links">
					<a href="/">Inicio</a>
					<a href="/soluciones/">Soluciones</a>
					<a href="/construccion/">Constructoras / Promotoras</a>
					<a href="/domotica/">Domótica / Inmótica</a>
					<a href="/formulario/">Contacto</a>
				</div>
			</div>
		<button id="openMenuBtn">Abrir Menú</button>
	</header>
	</section>
    <section class="seccion-form">
		<div class="form-container1" id="formulario" onclick="event.stopPropagation()">
			<button class="cerrar" onclick="cerrarform()">&times;</button>
			<!-- <img src="img/cuaderno.gif" alt="">-->
			<h2 >SOLICITA TU PRESUPUESTO</h2>
			<form action="https://formspree.io/f/xeoewzqd" method="POST" id="orderForm" onsubmit="handleSubmit(event)">
				<div class="form-row">
					<div class="form-group">
					<label for="nombre">Nombre completo *</label>
					<input type="text" id="nombre" name="nombre" placeholder="Juan García" required>
					</div>
					<div class="form-group">
					<label for="telefono">Teléfono *</label>
					<input type="tel" id="telefono" name="telefono" placeholder="+34 600 000 000" required>
					</div>
				</div>
				<div class="form-group full">
					<label for="email">Correo electrónico *</label>
					<input type="email" id="email" name="email" placeholder="juan@ejemplo.com" required>
				</div>

				<div class="form-divider"><span>CONTROL DE LUCES</span></div>
				<div class="qty-group">
					<!-- <label>Puntos de iluminación</label> -->
					<div class="qty-control">
					<button type="button" class="qty-btn" onclick="changeQty('luces_smart', -1)">−</button>
					<input class="qty-input" id="luces_smart" name="luces_smart" type="number" value="0" min="0" onchange="calculatePrice()">
					<button type="button" class="qty-btn" onclick="changeQty('luces_smart', 1)">+</button>
					</div>
				</div>

				<div class="form-divider"><span>PERSIANAS, CORTINAS, TOLDOS, PÉRGOLAS</span></div>
				<div class="qty-group">
					<!-- <label>Persianas, cortinas, toldos, pérgolas</label> -->
					<div class="qty-control">
					<button type="button" class="qty-btn" onclick="changeQty('persianas_smart', -1)">−</button>
					<input class="qty-input" id="persianas_smart" name="persianas_smart" type="number" value="0" min="0" onchange="calculatePrice()">
					<button type="button" class="qty-btn" onclick="changeQty('persianas_smart', 1)">+</button>
					</div>
				</div>

				<div class="form-divider"><span>SISTEMA DE SEGURIDAD</span></div>
				<div class="form-qty-row">
					<div class="qty-group">
					<label>Cámaras</label>
					<div class="qty-control">
						<button type="button" class="qty-btn" onclick="changeQty('camaras_seguridad', -1)">−</button>
						<input class="qty-input" id="camaras_seguridad" name="camaras_seguridad" type="number" value="0" min="0" onchange="calculatePrice()">
						<button type="button" class="qty-btn" onclick="changeQty('camaras_seguridad', 1)">+</button>
					</div>
					</div>
					<div class="qty-group">
					<label>Sensores</label>
					<div class="qty-control">
						<button type="button" class="qty-btn" onclick="changeQty('sensores_movimiento', -1)">−</button>
						<input class="qty-input" id="sensores_movimiento" name="sensores_movimiento" type="number" value="0" min="0" onchange="calculatePrice()">
						<button type="button" class="qty-btn" onclick="changeQty('sensores_movimiento', 1)">+</button>
					</div>
					</div>
				</div>
				<div class="qty-group" style="margin-top: 15px;">
					<label>Puertas</label>
					<div class="qty-control" style="max-width: 48%;">
					<button type="button" class="qty-btn" onclick="changeQty('cerradura', -1)">−</button>
					<input class="qty-input" id="cerradura" name="cerradura" type="number" value="0" min="0" onchange="calculatePrice()">
					<button type="button" class="qty-btn" onclick="changeQty('cerradura', 1)">+</button>
					</div>
				</div>

				<div class="form-divider"><span>CLIMATIZACIÓN</span></div>
				<div class="form-qty-row">
					<div class="qty-group">
					<label>Termostatos</label>
					<div class="qty-control">
						<button type="button" class="qty-btn" onclick="changeQty('termostatos_inteligentes', -1)">−</button>
						<input class="qty-input" id="termostatos_inteligentes" name="termostatos_inteligentes" type="number" value="0" min="0" onchange="calculatePrice()">
						<button type="button" class="qty-btn" onclick="changeQty('termostatos_inteligentes', 1)">+</button>
					</div>
					</div>
					<div class="qty-group">
					<label>Ventiladores</label>
					<div class="qty-control">
						<button type="button" class="qty-btn" onclick="changeQty('ventiladores_inteligentes', -1)">−</button>
						<input class="qty-input" id="ventiladores_inteligentes" name="ventiladores_inteligentes" type="number" value="0" min="0" onchange="calculatePrice()">
						<button type="button" class="qty-btn" onclick="changeQty('ventiladores_inteligentes', 1)">+</button>
					</div>
					</div>
				</div>

				<div class="form-divider"><span>ENTRETENIMIENTO Y AUDIO</span></div>
				<div class="form-qty-row">
					<div class="qty-group">
					<label>Altavoces</label>
					<div class="qty-control">
						<button type="button" class="qty-btn" onclick="changeQty('altavoces_inteligentes', -1)">−</button>
						<input class="qty-input" id="altavoces_inteligentes" name="altavoces_inteligentes" type="number" value="0" min="0" onchange="calculatePrice()">
						<button type="button" class="qty-btn" onclick="changeQty('altavoces_inteligentes', 1)">+</button>
					</div>
					</div>
					<div class="qty-group">
					<label>Videoporteros</label>
					<div class="qty-control">
						<button type="button" class="qty-btn" onclick="changeQty('videoporteros', -1)">−</button>
						<input class="qty-input" id="videoporteros" name="videoporteros" type="number" value="0" min="0" onchange="calculatePrice()">
						<button type="button" class="qty-btn" onclick="changeQty('videoporteros', 1)">+</button>
					</div>
					</div>
				</div>
				<div class="qty-group" style="margin-top: 15px;">
					<label>Pantallas</label>
					<div class="qty-control" style="max-width: 48%;">
					<button type="button" class="qty-btn" onclick="changeQty('pantallas_inteligentes', -1)">−</button>
					<input class="qty-input" id="pantallas_inteligentes" name="pantallas_inteligentes" type="number" value="0" min="0" onchange="calculatePrice()">
					<button type="button" class="qty-btn" onclick="changeQty('pantallas_inteligentes', 1)">+</button>
					</div>
				</div>

				<div class="form-divider"><span>CUENTANOS MÁS SOBRE TU PROYECTO</span></div>
				<div class="form-group full">
					<!-- <label for="message">Cuéntanos más sobre tu proyecto</label> -->
					<textarea id="message" name="message" placeholder="Describe el tipo de vivienda, necesidades específicas, plazos..."></textarea>
				</div>

				<button type="submit" class="submit-btn">Enviar solicitud de presupuesto</button>
			</form>
		</div>
	</section>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script>
		const form = document.getElementById('orderForm');
		form.addEventListener('submit', function(event) {
			event.preventDefault(); // Prevenir el envío tradicional del formulario
			var product1 = document.getElementById("luces_smart").value;
			var product2 = document.getElementById("persianas_smart").value;
			var product3 = document.getElementById("camaras_seguridad").value;
			var product4 = document.getElementById("sensores_movimiento").value;
			var product5 = document.getElementById("termostatos_inteligentes").value;
			var product6 = document.getElementById("ventiladores_inteligentes").value;
			var product7 = document.getElementById("altavoces_inteligentes").value;
			var product8 = document.getElementById("pantallas_inteligentes").value;
			var product9 = document.getElementById("videoporteros").value;
			var product10 = document.getElementById("cerradura").value;
			// Precios de los productos
			var price1 = 150;
			var price2 = 150;
			var price3 = 600;
			var price4 = 150;
			var price5 = 150;
			var price6 = 150;
			var price7 = 500;
			var price8 = 450;
			var price9 = 450;
			var price10 = 450;
			
			if ((product1 + product2 + product3 + product4 + product5 + product6 + product7 + product8 + product9 + product10) >= 30) {
				var central = 1000;
			} else {
				var central = 200;
			}
			
			// Crear un objeto FormData con los datos del formulario
			const formData = new FormData(form);
			var total = (product1 * price1) + (product2 * price2) + (product3 * price3) + (product4 * price4) + (product5 * price5)+ (product6 * price6) + (product7 * price7) + (product8 * price8) + (product9 * price9) + (product10 * price10) + central;
			document.getElementById("totalPrice").textContent  = total;
			document.getElementById("totalPriceInput").value = total;
			document.getElementById("totalPriceHidden").value = total;
			formData.append('total_price', total);
			// Enviar los datos mediante fetch a Formspree
			fetch('https://formspree.io/f/xeoewzqd', {
				method: 'POST',
				body: formData 
			})
			.then(response => {
				if (response.ok) {
					// Redirigir a una página de agradecimiento si el envío es exitoso
					window.location.href = "https://www.proyectossion.com/";
				} else {
					// Mostrar un mensaje de error si algo falla
					alert('Hubo un error al enviar el formulario');
				}
			})
		});
		function handleSubmit(event) {
            //event.preventDefault(); // Prevenir el envío tradicional del formulario

            // Aquí podemos procesar la lógica del envío (si es necesario con AJAX o similar)

            // Redirigir a la misma página (o cualquier página que quieras)
            setTimeout(() => {
                window.location.href = "https://www.proyectossion.com/"; // Redirige a la misma URL
            }, 1000); // Redirige después de 1 segundo
        }
	</script>
	<script> 
		function toggleMenu() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.toggle('active');}
	</script>
	<script>
    	document.getElementById('logo').addEventListener('click', 
		function() {
        	location.reload(); // Refresca la página
    		});
	</script>
	<script>
		fetch("/footer.html")
			.then(response => response.text())
			.then(data => {
				document.getElementById("footer").innerHTML = data;
			})
			.catch(error => console.error("Error al cargar el footer:", error));
	</script>
	<div id="footer"></div>
</body>
</html>
